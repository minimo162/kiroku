name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-msi:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Ensure llama-server sidecar
        shell: pwsh
        env:
          LLAMA_SERVER_SIDECAR_URL: ${{ vars.LLAMA_SERVER_SIDECAR_URL }}
          LLAMA_SERVER_SIDECAR_SHA256: ${{ vars.LLAMA_SERVER_SIDECAR_SHA256 }}
        run: |
          $binaryDir = "src-tauri/binaries"
          $binaryPath = Join-Path $binaryDir "llama-server-x86_64-pc-windows-msvc.exe"
          $downloadPath = Join-Path $env:RUNNER_TEMP "llama-server-sidecar"
          New-Item -ItemType Directory -Force -Path $binaryDir | Out-Null

          if ($env:LLAMA_SERVER_SIDECAR_URL) {
            $extension = [System.IO.Path]::GetExtension($env:LLAMA_SERVER_SIDECAR_URL)
            if ($extension -ieq ".zip") {
              $zipPath = "$downloadPath.zip"
              Invoke-WebRequest -Uri $env:LLAMA_SERVER_SIDECAR_URL -OutFile $zipPath
              $extractDir = Join-Path $env:RUNNER_TEMP "llama-server-sidecar-extracted"
              if (Test-Path $extractDir) {
                Remove-Item -Recurse -Force $extractDir
              }
              Expand-Archive -Path $zipPath -DestinationPath $extractDir
              $candidate = Get-ChildItem -Path $extractDir -Recurse -Filter "llama-server.exe" | Select-Object -First 1
              if (-not $candidate) {
                throw "The downloaded archive did not contain llama-server.exe"
              }
              Copy-Item $candidate.FullName $binaryPath -Force
            }
            else {
              Invoke-WebRequest -Uri $env:LLAMA_SERVER_SIDECAR_URL -OutFile $binaryPath
            }
          }

          if (-not (Test-Path $binaryPath)) {
            throw "Missing llama-server sidecar at $binaryPath. Commit the binary or set the LLAMA_SERVER_SIDECAR_URL repository variable."
          }

          if ($env:LLAMA_SERVER_SIDECAR_SHA256) {
            $actualHash = (Get-FileHash -Path $binaryPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $expectedHash = $env:LLAMA_SERVER_SIDECAR_SHA256.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "llama-server sidecar SHA256 mismatch. expected=$expectedHash actual=$actualHash"
            }
          }

      - name: Verify app
        run: |
          npm run check
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build MSI
        run: npm run tauri build

      - name: Sign MSI with Trusted Signing
        if: vars.TRUSTED_SIGNING_ENDPOINT != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: src-tauri/target/release/bundle/msi
          files-folder-filter: msi

      - name: Verify MSI signature
        if: vars.TRUSTED_SIGNING_ENDPOINT != ''
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "MSI artifact not found for signature verification"
          }
          signtool verify /pa /v $msi.FullName

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiroku-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/msi/*.msi
